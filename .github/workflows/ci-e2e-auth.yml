name: 'E2E: Auth'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-auth-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  e2e-auth:
    name: 'E2E: Auth'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vastu
          POSTGRES_PASSWORD: vastu
          POSTGRES_DB: vastu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vastu -d vastu"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vastu:vastu@localhost:5432/vastu
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-test-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-e2e-auth-${{ github.sha }}
          restore-keys: |
            turbo-e2e-auth-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Push database schema
        run: pnpm --filter @vastu/shared exec prisma db push --schema=./src/prisma/schema.prisma --skip-generate

      - name: Seed test data
        run: pnpm prisma:seed

      - name: Create .env for Next.js dev server
        run: |
          echo "AUTH_SECRET=$AUTH_SECRET" > packages/shell/.env
          echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> packages/shell/.env
          echo "DATABASE_URL=$DATABASE_URL" >> packages/shell/.env
          echo "REDIS_URL=$REDIS_URL" >> packages/shell/.env

      - name: Install Playwright browsers
        run: pnpm --filter @vastu/shell exec playwright install --with-deps chromium

      - name: Run auth E2E tests
        run: pnpm --filter @vastu/shell exec playwright test e2e/auth/

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-auth
          path: packages/shell/playwright-report/
          retention-days: 30
